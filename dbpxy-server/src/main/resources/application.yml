app:
  node: ${_pod_name:${HOSTNAME:localhost}}
  dbpxy-grpc:
    port: ${DBPXY_PORT:9090}
  encryption:
    enabled: ${USE_ENCRYPTION:true}

spring:
  main:
    banner-mode: off
    web-application-type: none
  profiles:
    group:
      integration: integration
      staging: staging
      production: production
  lifecycle:
    timeout-per-shutdown-phase: 20s
  jpa:
    open-in-view: false
  jmx:
    enabled: false
  h2:
    console:
      enabled: false
  grpc:
    server:
      enabled: false
      servlet:
        enabled: false

logging:
  pattern:
    console: '%clr(%d{${LOG_DATEFORMAT_PATTERN:yyyy-MM-dd HH:mm:ss.SSS}}){faint} %clr(${LOG_LEVEL_PATTERN:%5p}) %clr(${PID: }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %clr(conn=%X{dbpxy.conn.id},tx=%X{dbpxy.tx.id},qry=%X{dbpxy.qry.id} :) %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}}'
  level:
    root: ${ROOT_LOG_LEVEL:INFO}
    com.dbpxy: ${APP_LOG_LEVEL:INFO}
    org.hibernate.orm: ERROR
