_pod_name: localhost

app:
  dbpxy:
    hostname: localhost
    port: ${GRPC_PORT:9090}
    show-sql: false
    keep-alive-interval-s: 30
    keep-alive-timeout-s: 30
    timeout-s: 1

server:
  port: 9091
  shutdown: immediate
  servlet:
    context-path: /

spring:
  main:
    web-application-type: servlet
    register-shutdown-hook: false

logging:
  level:
    root: INFO
    com.dbpxy: INFO
