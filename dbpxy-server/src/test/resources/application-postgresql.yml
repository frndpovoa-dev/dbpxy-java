app:
  dbpxy-datasource:
    activation: LAZY
    database: POSTGRESQL
    url: jdbc:postgresql://localhost:${POSTGRESQL_PORT}/${POSTGRESQL_DATABASE}
    props:
      - name: user
        value: ${POSTGRESQL_USER}
      - name: password
        value: ${POSTGRESQL_PASSWORD}

spring:
  data:
    jdbc:
      dialect: postgresql
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
