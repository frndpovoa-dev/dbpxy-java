app:
  dbpxy-datasource:
    activation: LAZY
    database: ORACLE
    url: jdbc:oracle:thin:@localhost:${ORACLE_PORT}/${ORACLE_DATABASE}
    props:
      - name: user
        value: ${ORACLE_USER}
      - name: password
        value: ${ORACLE_PASSWORD}

spring:
  data:
    jdbc:
      dialect: oracle
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
