app:
  node: ${_pod_name:${HOSTNAME:localhost}}
  dbpxy-grpc:
    port: ${GRPC_PORT:9090}
  encryption:
    enabled: ${USE_ENCRYPTION:true}

spring:
  main:
    banner-mode: off
  profiles:
    group:
      integration: integration
      staging: staging
      production: production
  grpc:
    server:
      enabled: false
      servlet:
        enabled: false

logging:
  pattern:
    console: '%clr(%d{${LOG_DATEFORMAT_PATTERN:yyyy-MM-dd HH:mm:ss.SSS}}){faint} %clr(${LOG_LEVEL_PATTERN:%5p}) %clr(${PID: }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %clr(transaction=%X{transaction.id},query=%X{query.id} :) %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}}'
  level:
    root: ${ROOT_LOG_LEVEL:INFO}
    com.dbpxy: ${APP_LOG_LEVEL:INFO}
