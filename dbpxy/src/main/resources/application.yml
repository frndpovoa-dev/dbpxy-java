app:
  node: ${_pod_name:${HOSTNAME}}
  dbpxy-grpc:
    port: ${GRPC_PORT:9090}
  postgresql:
    database: ${POSTGRESQL_DATABASE}
    hostname: ${POSTGRESQL_HOSTNAME}
    port: ${POSTGRESQL_PORT}
    username: ${POSTGRESQL_USERNAME}
    password: ${POSTGRESQL_PASSWORD}
    url: ${POSTGRESQL_URL:jdbc:postgresql://${app.postgresql.hostname}:${app.postgresql.port}/${app.postgresql.database}?user=${app.postgresql.username}&password=${app.postgresql.password}}
    show-sql: true
  encryption:
    enabled: ${USE_ENCRYPTION:true}

server:
  port: ${PORT:9091}
  shutdown: graceful
  servlet:
    context-path: ${APP_CONTEXT:/}

spring:
  main:
    banner-mode: off
  profiles:
    group:
      integration: integration
      staging: staging
      production: production
  web:
    error:
      whitelabel:
        enabled: false
  grpc:
    server:
      enabled: false
      servlet:
        enabled: false

management:
  server:
    port: ${MGMT_PORT:9051}
  endpoint:
    health:
      enabled: true
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  endpoints:
    web:
      base-path: /manage
      exposure:
        include:
          - health
    access:
      default: none

logging:
  pattern:
    console: '%clr(%d{${LOG_DATEFORMAT_PATTERN:yyyy-MM-dd HH:mm:ss.SSS}}){faint} %clr(${LOG_LEVEL_PATTERN:%5p}) %clr(${PID: }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %clr(transaction=%X{transaction.id},query=%X{query.id} :) %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}}'
  level:
    root: ${ROOT_LOG_LEVEL:INFO}
    com.dbpxy: ${APP_LOG_LEVEL:INFO}
