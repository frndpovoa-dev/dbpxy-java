_pod_name: localhost

app:
  dbpxy:
    hostname: localhost
    port: 9090
    show-sql: false
  dbpxy-datasource:
    url: jdbc:postgresql://localhost:${POSTGRESQL_PORT:5432}/postgres
    props:
      - name: user
        value: postgres
      - name: password
        value: postgres

server:
  port: 9091
  shutdown: immediate
  servlet:
    context-path: /

spring:
  main:
    web-application-type: servlet
    register-shutdown-hook: false

logging:
  level:
    root: INFO
    com.dbpxy: DEBUG
